<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Road Pothole Monitoring Dashboard">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Pothole Dashboard">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Road Monitoring Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
  </style>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBEX4si9SC1q0nY-0tXwKU-wGwOqwAJJc"></script>
</head>
<body>
  <script>
    var serviceWorkerVersion = null;
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) { return; }
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        var serviceWorkerUrl = 'flutter_service_worker.js?v=' + serviceWorkerVersion;
        navigator.serviceWorker.register(serviceWorkerUrl).then(function(reg) {
          function waitForActivation(serviceWorker) {
            serviceWorker.addEventListener('statechange', function() {
              if (serviceWorker.state == 'activated') { loadMainDartJs(); }
            });
          }
          if (!reg.active && (reg.installing || reg.waiting)) {
            waitForActivation(reg.installing || reg.waiting);
          } else if (!reg.active.scriptURL.endsWith(serviceWorkerVersion)) {
            reg.update();
            waitForActivation(reg.installing);
          } else { loadMainDartJs(); }
        });
      });
    } else { loadMainDartJs(); }
  </script>
</body>
</html>
